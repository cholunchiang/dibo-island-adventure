<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏝️ 島嶼冒險 - 迪寶兒的動物森友會無人島探險日誌</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary-color: #D4A574;
            --secondary-color: #E6CDBA;
            --accent-color: #6BBD8E;
            --danger-color: #E17055;
            --bg-light: #FEF9F3;
            --bg-dark: #2C2416;
            --text-light: #2C2416;
            --text-dark: #FEF9F3;
            --border-color: rgba(212, 165, 116, 0.2);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: var(--bg-light);
                --text-color: var(--text-light);
            }
            body {
                background: linear-gradient(135deg, var(--bg-light) 0%, rgba(212, 165, 116, 0.05) 100%);
            }
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-color: var(--bg-light);
                --text-color: var(--text-light);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, rgba(212, 165, 116, 0.05) 100%);
            color: var(--text-color);
            min-height: 100vh;
        }

        .sync-status {
            position: fixed;
            top: 12px;
            right: 12px;
            padding: 8px 12px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(107, 189, 142, 0.2), rgba(107, 189, 142, 0.1));
            border: 1px solid rgba(107, 189, 142, 0.3);
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 999;
            color: #4A8D5F;
        }

        .sync-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4A8D5F;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .container { max-width: 600px; margin: 0 auto; padding: 16px; }

        .header {
            text-align: center;
            margin-bottom: 24px;
            padding: 24px 16px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.08), rgba(230, 205, 180, 0.06));
            border: 2px solid var(--border-color);
        }

        .header h1 { font-size: 32px; margin-bottom: 4px; }
        .header p { font-size: 14px; opacity: 0.7; margin-bottom: 12px; }

        .header-info {
            font-size: 12px;
            opacity: 0.8;
            line-height: 1.6;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding: 4px 0;
            border-bottom: 2px solid var(--border-color);
        }

        .tab-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.3s;
            color: var(--text-color);
            opacity: 0.6;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            opacity: 1;
            color: white;
        }

        .content-area { display: none; }
        .content-area.active { display: block; }

        .card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.7), rgba(245, 239, 231, 0.5));
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            backdrop-filter: blur(10px);
        }

        .card h2 { font-size: 18px; margin-bottom: 12px; color: var(--primary-color); }

        .search-box, .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 11px 13px;
            border-radius: 12px;
            border: 2px solid var(--secondary-color);
            font-size: 14px;
            color: var(--text-color);
            background: rgba(255, 255, 255, 0.8);
            font-family: inherit;
            transition: all 0.3s;
        }

        .search-box:focus, .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.08);
        }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; opacity: 0.85; }
        .form-group textarea { resize: vertical; min-height: 80px; }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            width: 100%;
            margin-bottom: 8px;
        }

        button:active { transform: scale(0.98); }
        button.danger { background: linear-gradient(135deg, #E17055, #D63031); }

        .island-list { display: flex; flex-direction: column; gap: 8px; }

        .island-item {
            padding: 12px;
            background: linear-gradient(135deg, rgba(107, 189, 142, 0.08), rgba(107, 189, 142, 0.05));
            border: 2px solid rgba(107, 189, 142, 0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .island-item:active { transform: scale(0.98); }

        .island-item-title { font-weight: 600; margin-bottom: 2px; }
        .island-item-type { font-size: 12px; opacity: 0.6; }

        .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .resource-tag, .drop-tag {
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
            background: linear-gradient(135deg, rgba(107, 189, 142, 0.15), rgba(107, 189, 142, 0.08));
            color: #4A8D5F;
            border: 1px solid rgba(107, 189, 142, 0.3);
        }

        .drop-tag {
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.15), rgba(212, 165, 116, 0.08));
            color: #9B7E54;
            border: 1px solid rgba(212, 165, 116, 0.3);
        }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }

        .stat-item {
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.1), rgba(230, 205, 180, 0.08));
            padding: 14px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(212, 165, 116, 0.2);
        }

        .stat-value { font-size: 28px; font-weight: 700; color: var(--primary-color); margin-bottom: 4px; }
        .stat-label { font-size: 11px; opacity: 0.7; }

        .empty-state { text-align: center; padding: 40px 20px; opacity: 0.6; font-size: 13px; }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            align-items: flex-end;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(3px);
        }

        .modal-overlay.show { display: flex; }

        .modal {
            width: 100%;
            max-height: 90vh;
            border-radius: 30px 30px 0 0;
            padding: 24px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(245, 239, 231, 0.95) 100%);
            box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 22px;
            font-weight: 700;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--secondary-color), #E0D0BF);
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .modal-close:active { transform: scale(0.95); }

        .resource-section { margin-bottom: 18px; }
        .resource-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; opacity: 0.8; }

        .record-section { border-top: 2px solid rgba(212, 165, 116, 0.1); padding-top: 18px; margin-top: 18px; }

        .log-item {
            padding: 12px;
            background: rgba(212, 165, 116, 0.05);
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .log-item-name { font-weight: 600; }
        .log-item-date { font-size: 12px; opacity: 0.6; }
        .log-item-count { font-weight: 700; color: var(--primary-color); font-size: 18px; }

        .category-progress-item { margin-bottom: 12px; }
        .category-progress-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(212, 165, 116, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            transition: width 0.3s;
        }

        .decoration {
            position: fixed;
            pointer-events: none;
            opacity: 0.1;
            z-index: 0;
        }

        .leaf-1 { top: 10%; right: 5%; font-size: 40px; animation: float 8s ease-in-out infinite; }
        .leaf-2 { top: 30%; left: 5%; font-size: 35px; animation: float 7s ease-in-out infinite 1s; }
        .flower-1 { top: 50%; right: 10%; font-size: 30px; animation: float 9s ease-in-out infinite 2s; }
        .flower-2 { top: 70%; left: 8%; font-size: 28px; animation: float 6s ease-in-out infinite 1.5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @media (max-width: 480px) {
            .container { padding: 12px; }
            .header { padding: 16px 12px; }
            .modal { border-radius: 24px 24px 0 0; }
        }
    </style>
</head>
<body>
    <div class="decoration leaf-1">🍃</div>
    <div class="decoration leaf-2">🌿</div>
    <div class="decoration flower-1">🌼</div>
    <div class="decoration flower-2">🌸</div>

    <div class="sync-status synced" id="syncStatus">
        <div class="sync-dot"></div>
        <span id="syncText">✅ 已準備好</span>
    </div>

    <div class="container">
        <div class="header">
            <h1>🏝️ 島嶼冒險</h1>
            <p>✨ 記錄你的無人島探險故事</p>
            <div class="header-info">
                <div>🏠 <strong>胖嘟嘟推不島</strong></div>
                <div>👤 <strong>迪寶兒</strong> 的冒險日誌</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('explore')">🗺️ 探索</button>
            <button class="tab-btn" onclick="switchTab('add')">➕ 新增</button>
            <button class="tab-btn" onclick="switchTab('record')">📝 日誌</button>
            <button class="tab-btn" onclick="switchTab('stats')">📊 冒險</button>
        </div>

        <div id="explore" class="content-area active">
            <div class="card">
                <h2>🔍 搜尋島嶼</h2>
                <input type="text" class="search-box" id="searchInput" placeholder="輸入島嶼名稱..." onkeyup="filterIslands()">
            </div>
            <div class="card">
                <div class="island-list" id="islandList"></div>
            </div>
        </div>

        <div id="add" class="content-area">
            <div class="card">
                <h2>➕ 新增自訂島嶼</h2>
                <form onsubmit="addCustomIsland(event)">
                    <div class="form-group">
                        <label>🏝️ 島嶼名稱 *</label>
                        <input type="text" id="customName" placeholder="例：龍蝦島" required>
                    </div>
                    <div class="form-group">
                        <label>🏷️ 島嶼類型 *</label>
                        <select id="customType" required>
                            <option value="">選擇類型</option>
                            <option value="季節特殊">季節特殊</option>
                            <option value="蔬菜">蔬菜</option>
                            <option value="花卉">花卉</option>
                            <option value="其他">其他</option>
                            <option value="自訂">自訂</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>🎁 主要資源</label>
                        <input type="text" id="customResources" placeholder="用逗號分隔，例：龍蝦, 海星, 珍珠">
                    </div>
                    <div class="form-group">
                        <label>💎 掉落物品</label>
                        <input type="text" id="customDrops" placeholder="用逗號分隔，例：食譜, 配方">
                    </div>
                    <div class="form-group">
                        <label>📝 說明</label>
                        <textarea id="customDescription" placeholder="簡短說明這個島嶼的特色..."></textarea>
                    </div>
                    <button type="submit">✅ 新增島嶼</button>
                </form>
            </div>
            <div class="card">
                <h2>📋 我的自訂島嶼</h2>
                <div id="customIslandsList"></div>
            </div>
        </div>

        <div id="record" class="content-area">
            <div class="card">
                <h2>📝 冒險日誌</h2>
                <div id="visitLog"></div>
                <div id="emptyLog" class="empty-state">還沒有冒險紀錄呢～ 快去探索吧！</div>
            </div>
        </div>

        <div id="stats" class="content-area">
            <div class="card">
                <h2>📊 冒險統計</h2>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="totalVisits">0</div>
                        <div class="stat-label">總訪問次數</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="uniqueIslands">0</div>
                        <div class="stat-label">探索過的島嶼</div>
                    </div>
                </div>
            </div>
            <div class="card">
                <h2>⭐ 最愛的島嶼</h2>
                <div id="topIslands"></div>
            </div>
            <div class="card">
                <h2>📈 探險進度</h2>
                <div id="categoryProgress"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <span id="modalTitle"></span>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="resource-section">
                <h3>🎁 主要資源</h3>
                <div class="tags" id="resourceTags"></div>
            </div>
            <div class="resource-section">
                <h3>💎 掉落物品</h3>
                <div class="tags" id="dropTags"></div>
            </div>
            <div class="resource-section">
                <h3>📝 島嶼介紹</h3>
                <p id="description" style="line-height: 1.6;"></p>
            </div>
            <div class="record-section">
                <h3>📋 訪問次數</h3>
                <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                    <button onclick="addVisit()" style="margin-bottom: 0;">+1 訪問</button>
                    <button class="danger" onclick="resetVisits()" style="margin-bottom: 0; flex: 1;">重設</button>
                </div>
                <div style="text-align: center; font-size: 36px; font-weight: 700; margin: 16px 0; color: var(--primary-color);" id="visitCount">0</div>
            </div>
            <div class="resource-section">
                <h3>💭 探險筆記</h3>
                <textarea id="islandNotes" placeholder="記錄你在此島的特別發現或心得..."></textarea>
                <button onclick="saveIslandNotes()" style="margin-bottom: 0;">💾 保存筆記</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js"></script>

    <script>
        // ========== LOG 系統 ==========
        const LOG = {
            logs: [],
            maxLogs: 500,
            
            add(level, message, data = null) {
                const timestamp = new Date().toLocaleTimeString('zh-TW');
                const logEntry = {
                    timestamp,
                    level,
                    message,
                    data: data ? JSON.stringify(data) : '',
                    fullText: `[${timestamp}] [${level}] ${message}${data ? ': ' + JSON.stringify(data) : ''}`
                };
                
                this.logs.push(logEntry);
                if (this.logs.length > this.maxLogs) {
                    this.logs.shift();
                }
                
                console.log(logEntry.fullText);
            },
            
            info(msg, data) { this.add('INFO', msg, data); },
            success(msg, data) { this.add('✅ SUCCESS', msg, data); },
            error(msg, data) { this.add('❌ ERROR', msg, data); },
            warn(msg, data) { this.add('⚠️ WARN', msg, data); },
            
            getAll() {
                return this.logs.map(l => l.fullText).join('\n');
            },
            
            export() {
                const text = this.getAll();
                const blob = new Blob([text], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `logs_${new Date().toISOString()}.txt`;
                a.click();
                URL.revokeObjectURL(url);
            }
        };

        // ========== 變數定義 ==========
        const firebaseConfig = {
          apiKey: "AIzaSyDwgZjAw-6D-oQAkPMpXr06ypdrTb39gdo",
          authDomain: "dibo-island-adventure.firebaseapp.com",
          databaseURL: "https://dibo-island-adventure-default-rtdb.firebaseio.com",
          projectId: "dibo-island-adventure",
          storageBucket: "dibo-island-adventure.firebasestorage.app",
          messagingSenderId: "822555933244",
          appId: "1:822555933244:web:cb655678944ba55d1a6139"
        };

        let app = null;
        let db = null;
        let currentIsland = null;
        let visitData = {};
        let islandNotes = {};
        let customIslands = {};
        let isSyncing = false;
        let lastSyncTime = 0;
        let syncQueue = [];
        
        // ========== Firebase 初始化 ==========
        async function initFirebase() {
            LOG.info('🔄 開始初始化 Firebase');
            
            try {
                if (app) {
                    LOG.info('✓ Firebase 已初始化');
                    updateSyncStatus('✅ 已同步');
                    await loadDataFromFirebase();
                    return;
                }

                app = firebase.initializeApp(firebaseConfig);
                db = firebase.getDatabase(app);
                LOG.success('Firebase 初始化成功', { databaseURL: firebaseConfig.databaseURL });
                
                updateSyncStatus('⏳ 同步中...');
                await loadDataFromFirebase();
                updateSyncStatus('✅ 已同步');
                
                // 每 5 秒檢查一次是否需要同步
                setInterval(checkAndSyncQueue, 5000);
                
            } catch (error) {
                LOG.error('Firebase 初始化失敗', error.message);
                
                if (error.code === 'app/duplicate-app') {
                    LOG.warn('Firebase 已在別處初始化，使用現有連接');
                    db = firebase.getDatabase();
                    updateSyncStatus('⏳ 同步中...');
                    await loadDataFromFirebase();
                    updateSyncStatus('✅ 已同步');
                    setInterval(checkAndSyncQueue, 5000);
                    return;
                }
                
                updateSyncStatus('❌ 連接失敗');
            }
        }

        // ========== 讀取資料 ==========
        async function loadDataFromFirebase() {
            if (isSyncing) {
                LOG.warn('正在同步中，跳過重複的讀取');
                return;
            }
            
            LOG.info('📖 開始讀取 Firebase 資料');
            isSyncing = true;
            
            try {
                if (!db) {
                    LOG.error('Firebase 未初始化');
                    return;
                }
                
                const startTime = performance.now();
                const snapshot = await firebase.database().ref('/').get();
                const loadTime = (performance.now() - startTime).toFixed(2);
                
                const data = snapshot.val() || {};
                LOG.success('✓ 成功讀取資料', { 
                    loadTime: `${loadTime}ms`,
                    hasVisitData: !!data.visitData,
                    hasIslandNotes: !!data.islandNotes,
                    hasCustomIslands: !!data.customIslands
                });
                
                // 更新本地資料
                visitData = data.visitData || {};
                islandNotes = data.islandNotes || {};
                customIslands = data.customIslands || {};
                
                LOG.info('✓ 本地資料已更新', {
                    visitCount: Object.keys(visitData).length,
                    notesCount: Object.keys(islandNotes).length,
                    customIslandsCount: Object.keys(customIslands).length
                });
                
                renderDisplay();
                
            } catch (error) {
                LOG.error('❌ 讀取失敗', error.message);
                updateSyncStatus('❌ 連接失敗');
            } finally {
                isSyncing = false;
            }
        }

        // ========== 保存資料 ==========
        async function saveToFirebase() {
            LOG.info('💾 開始保存資料到 Firebase');
            
            // 如果正在同步，加入隊列
            if (isSyncing) {
                LOG.warn('⏳ 正在同步中，將操作加入隊列');
                syncQueue.push('save');
                return;
            }
            
            isSyncing = true;
            updateSyncStatus('⏳ 保存中...');
            
            try {
                if (!db) {
                    LOG.warn('Firebase 未初始化，延遲 1 秒後重試');
                    updateSyncStatus('⏳ 連接中...');
                    isSyncing = false;
                    setTimeout(saveToFirebase, 1000);
                    return;
                }
                
                const startTime = performance.now();
                
                // 使用 transaction 來處理衝突
                await firebase.database().ref('/').update({
                    visitData,
                    islandNotes,
                    customIslands,
                    lastUpdated: new Date().toISOString(),
                    lastDevice: navigator.userAgent.substring(0, 50)
                });
                
                const saveTime = (performance.now() - startTime).toFixed(2);
                
                LOG.success('✓ 保存成功', { 
                    saveTime: `${saveTime}ms`,
                    lastUpdated: new Date().toLocaleString('zh-TW')
                });
                
                updateSyncStatus('✅ 已同步');
                lastSyncTime = Date.now();
                
                // 立即讀取最新資料確保一致性
                await loadDataFromFirebase();
                
            } catch (error) {
                LOG.error('❌ 保存失敗', error.message);
                updateSyncStatus('❌ 連接失敗');
                syncQueue.push('save');
            } finally {
                isSyncing = false;
            }
        }

        // ========== 隊列檢查和同步 ==========
        async function checkAndSyncQueue() {
            if (syncQueue.length > 0 && !isSyncing) {
                LOG.info('📤 隊列中有待同步的操作', { queueLength: syncQueue.length });
                syncQueue = [];
                await saveToFirebase();
            }
        }

        // ========== UI 更新 ==========
        function updateSyncStatus(text) {
            const el = document.getElementById('syncText');
            if (el) {
                el.textContent = text;
                LOG.info('🔔 同步狀態更新', { status: text });
            }
        }

        // ========== Log 按鈕 ==========
        function showLogs() {
            const logText = LOG.getAll();
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.5); display: flex; align-items: center;
                justify-content: center; z-index: 10000;
            `;
            
            const content = document.createElement('div');
            content.style.cssText = `
                background: white; padding: 20px; border-radius: 12px;
                width: 90%; max-width: 600px; max-height: 80vh;
                overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            `;
            
            content.innerHTML = `
                <h2 style="margin-top: 0;">📋 詳細 Log</h2>
                <textarea readonly style="width: 100%; height: 400px; padding: 10px; 
                    border: 2px solid #D4A574; border-radius: 8px; font-family: monospace;
                    font-size: 12px;">${logText}</textarea>
                <div style="margin-top: 15px; display: flex; gap: 10px;">
                    <button onclick="LOG.export()" style="flex: 1; padding: 10px; 
                        background: #D4A574; color: white; border: none;
                        border-radius: 6px; cursor: pointer; font-weight: 600;">
                        💾 下載 Log
                    </button>
                    <button onclick="this.closest('[style*=fixed]').remove()" style="flex: 1; 
                        padding: 10px; background: #ccc; color: black;
                        border: none; border-radius: 6px; cursor: pointer; font-weight: 600;">
                        ✕ 關閉
                    </button>
                </div>
            `;
            
            modal.appendChild(content);
            document.body.appendChild(modal);
            modal.onclick = (e) => e.target === modal && modal.remove();
        }

        // ========== 其他 Functions（保持原有邏輯但加入 log）==========
        function switchTab(tabName) {
            LOG.info('🔀 切換標籤', { tab: tabName });
            document.querySelectorAll('.content-area').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function filterIslands() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            LOG.info('🔍 搜尋島嶼', { searchTerm });
            document.querySelectorAll('.island-item').forEach(item => {
                item.style.display = item.textContent.toLowerCase().includes(searchTerm) ? 'block' : 'none';
            });
        }

        function openIslandModal(islandName) {
            LOG.info('🏝️ 打開島嶼詳情', { island: islandName });
            currentIsland = islandName;
            const island = allIslands[islandName];
            if (!island) {
                LOG.error('島嶼未找到', { island: islandName });
                return;
            }
            
            const visitInfo = visitData[islandName] || { count: 0, date: '尚未訪問' };
            const notes = islandNotes[islandName] || '';
            
            document.getElementById('modalTitle').textContent = `${island.emoji} ${islandName}`;
            document.getElementById('resourceTags').innerHTML = (island.resources || []).map(r => `<span class="resource-tag">${r}</span>`).join('');
            document.getElementById('dropTags').innerHTML = (island.drops || []).map(d => `<span class="drop-tag">${d}</span>`).join('');
            document.getElementById('description').textContent = island.description || '暫無介紹';
            document.getElementById('visitCount').textContent = visitInfo.count;
            document.getElementById('islandNotes').value = notes;
            document.getElementById('modalOverlay').classList.add('show');
        }

        function closeModal() {
            LOG.info('❌ 關閉模態框');
            document.getElementById('modalOverlay').classList.remove('show');
            currentIsland = null;
        }

        function addVisit() {
            if (!currentIsland) return;
            LOG.info('➕ 添加訪問', { island: currentIsland });
            
            if (!visitData[currentIsland]) {
                visitData[currentIsland] = { count: 0, date: new Date().toLocaleDateString('zh-TW') };
            }
            visitData[currentIsland].count += 1;
            document.getElementById('visitCount').textContent = visitData[currentIsland].count;
            
            LOG.info('✓ 訪問次數已更新', { 
                island: currentIsland, 
                newCount: visitData[currentIsland].count 
            });
            
            renderDisplay();
            saveToFirebase();
        }

        function resetVisits() {
            if (!currentIsland || !confirm('確定要重設？')) return;
            LOG.info('🔄 重設訪問次數', { island: currentIsland });
            
            visitData[currentIsland] = { count: 0, date: new Date().toLocaleDateString('zh-TW') };
            document.getElementById('visitCount').textContent = '0';
            
            LOG.info('✓ 訪問次數已重設', { island: currentIsland });
            
            renderDisplay();
            saveToFirebase();
        }

        function saveIslandNotes() {
            if (!currentIsland) return;
            const notes = document.getElementById('islandNotes').value;
            LOG.info('💭 保存島嶼筆記', { island: currentIsland, notesLength: notes.length });
            
            islandNotes[currentIsland] = notes;
            LOG.info('✓ 筆記已更新', { island: currentIsland });
            
            saveToFirebase();
            alert('✅ 筆記已保存！');
        }

        function addCustomIsland(event) {
            event.preventDefault();
            const name = document.getElementById('customName').value;
            LOG.info('➕ 添加自訂島嶼', { name });
            
            const type = document.getElementById('customType').value;
            const resources = document.getElementById('customResources').value.split(',').map(r => r.trim()).filter(r => r);
            const drops = document.getElementById('customDrops').value.split(',').map(d => d.trim()).filter(d => d);
            const desc = document.getElementById('customDescription').value;
            
            const customId = `custom_${Date.now()}`;
            customIslands[customId] = { name, type, resources, drops, description: desc, emoji: '🏝️' };
            allIslands[name] = customIslands[customId];
            
            LOG.success('✓ 自訂島嶼已添加', { name, customId });
            
            document.getElementById('customName').value = '';
            document.getElementById('customResources').value = '';
            document.getElementById('customDrops').value = '';
            document.getElementById('customDescription').value = '';
            
            saveToFirebase();
            renderDisplay();
            alert('✅ 島嶼已添加！');
        }

        function renderDisplay() {
            LOG.info('🎨 重新渲染頁面');
            renderIslandList();
            renderVisitLog();
            renderStats();
            renderCustomIslands();
        }

        function renderIslandList() {
            if (!allIslands || Object.keys(allIslands).length === 0) {
                LOG.warn('島嶼列表為空');
                return;
            }
            
            document.getElementById('islandList').innerHTML = Object.entries(allIslands).map(([name, island]) => {
                const visitCount = visitData[name]?.count || 0;
                const visitBadge = visitCount > 0 ? `<span style="color: var(--primary-color); font-weight: 700; font-size: 14px;">${visitCount}次</span>` : '';
                return `
                    <div class="island-item" onclick="openIslandModal('${name}')">
                        <div style="flex: 1;">
                            <div class="island-item-title">${island.emoji} ${name}</div>
                            <div class="island-item-type">${island.type}</div>
                        </div>
                        <div style="text-align: right;">${visitBadge}</div>
                    </div>
                `;
            }).join('');
        }

        function renderVisitLog() {
            const log = document.getElementById('visitLog');
            const empty = document.getElementById('emptyLog');
            const items = Object.entries(visitData).filter(([, data]) => data.count > 0).sort((a, b) => b[1].count - a[1].count);
            
            if (items.length === 0) {
                log.innerHTML = '';
                empty.style.display = 'block';
            } else {
                empty.style.display = 'none';
                log.innerHTML = items.map(([name, data]) => `
                    <div class="log-item">
                        <div>
                            <div class="log-item-name">${name}</div>
                            <div class="log-item-date">首訪: ${data.date}</div>
                        </div>
                        <div class="log-item-count">${data.count}</div>
                    </div>
                `).join('');
            }
        }

        function renderStats() {
            const totalVisits = Object.values(visitData).reduce((sum, d) => sum + d.count, 0);
            const uniqueIslands = Object.keys(visitData).filter(k => visitData[k].count > 0).length;
            document.getElementById('totalVisits').textContent = totalVisits;
            document.getElementById('uniqueIslands').textContent = uniqueIslands;

            const topIslands = document.getElementById('topIslands');
            const top5 = Object.entries(visitData).filter(([, data]) => data.count > 0).sort((a, b) => b[1].count - a[1].count).slice(0, 5);
            topIslands.innerHTML = top5.length === 0 ? '<div class="empty-state">還沒有訪問過任何島嶼</div>' : top5.map(([name, data]) => `
                <div class="log-item">
                    <span>${name}</span>
                    <span style="color: var(--primary-color); font-weight: 700;">${data.count} 次</span>
                </div>
            `).join('');
        }

        function renderCustomIslands() {
            const container = document.getElementById('customIslandsList');
            const items = Object.entries(customIslands).map(([id, island]) => `
                <div class="card">
                    <h3>${island.emoji} ${island.name}</h3>
                    <p style="font-size: 12px; opacity: 0.7; margin-bottom: 8px;">${island.type}</p>
                    <p>${island.description}</p>
                </div>
            `).join('');
            container.innerHTML = items || '<div class="empty-state">還沒有自訂島嶼</div>';
        }

        const allIslands = {
            "特殊植物島": { emoji: "🌿", type: "季節特殊", resources: ["光蘚", "蔓藤", "雞蛋花"], drops: ["光蘚配方", "蔓藤配方"], description: "生長著光蘚、蔓藤還有灌木的雞蛋花，可以撿到特殊配方" },
            "富有島": { emoji: "💰", type: "季節特殊", resources: ["搖錢樹", "錢石頭"], drops: ["1000鈴錢/包"], description: "所有的石頭都會出錢，非常划算的島嶼！" },
            "櫻花島": { emoji: "🌸", type: "季節特殊", resources: ["櫻花樹"], drops: ["櫻花花瓣", "櫻花配方"], description: "春季限定，生長著美麗的櫻花樹" },
            "夏天島": { emoji: "☀️", type: "季節特殊", resources: ["夏天貝殼"], drops: ["夏天貝殼配方"], description: "海邊有特殊的夏天貝殼" },
            "紅葉島": { emoji: "🍂", type: "季節特殊", resources: ["松果", "紅葉"], drops: ["紅葉配方"], description: "秋季限定，地上有松果和紅葉" },
            "蘑菇島": { emoji: "🍄", type: "季節特殊", resources: ["蘑菇", "松果"], drops: ["蘑菇配方"], description: "秋季限定，生長著可愛的蘑菇" },
            "冬天島": { emoji: "❄️", type: "季節特殊", resources: ["雪花"], drops: ["雪傢俱配方"], description: "冬季限定，能抓到美麗的雪花" },
            "夜晚島": { emoji: "🌙", type: "季節特殊", resources: ["普通資源"], drops: ["普通配方"], description: "時間永遠是晚上的神秘島嶼" },
            "胡蘿蔔島": { emoji: "🥕", type: "蔬菜", resources: ["胡蘿蔔"], drops: ["菜譜"], description: "生長著新鮮的胡蘿蔔" },
            "番茄島": { emoji: "🍅", type: "蔬菜", resources: ["番茄"], drops: ["菜譜"], description: "生長著香甜的番茄" },
            "土豆島": { emoji: "🥔", type: "蔬菜", resources: ["土豆"], drops: ["菜譜"], description: "生長著營養的土豆" },
            "甘蔗島": { emoji: "🌾", type: "蔬菜", resources: ["甘蔗"], drops: ["菜譜"], description: "生長著甜蜜的甘蔗" },
            "小麥島": { emoji: "🌾", type: "蔬菜", resources: ["小麥"], drops: ["菜譜"], description: "生長著金黃的小麥" },
            "南瓜島": { emoji: "🎃", type: "蔬菜", resources: ["南瓜"], drops: ["菜譜"], description: "生長著可愛的橙色南瓜" },
            "陶俑島": { emoji: "🏺", type: "其他", resources: ["陶俑", "陶俑碎片"], drops: ["陶俑碎片"], description: "下雨時一定會有一個陶俑" },
            "竹子島": { emoji: "🎋", type: "其他", resources: ["竹子"], drops: ["竹配方"], description: "能挖竹筍" },
            "杜鵑和鬱金香島": { emoji: "🌷", type: "花卉", resources: ["杜鵑", "鬱金香"], drops: [], description: "生長著嬌豔的花卉" },
            "柊和玫瑰島": { emoji: "🌹", type: "花卉", resources: ["柊", "玫瑰"], drops: [], description: "生長著優雅的玫瑰花" }
        };

        window.addEventListener('DOMContentLoaded', () => {
            LOG.info('🚀 頁面加載完成，開始初始化');
            renderIslandList();
            initFirebase();
            
            document.getElementById('modalOverlay').addEventListener('click', (e) => {
                if (e.target === document.getElementById('modalOverlay')) closeModal();
            });
        });
    </script>
</script>

</body>
